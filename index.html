<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <title>Rosa US Avellino</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet"> 

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer components {
            .badge-base {
                @apply after:inline-block after:text-[11px] after:rounded-md after:px-1.5 after:py-[1px] after:ml-2.5 after:-translate-y-px;
            }
            .over {
                @apply badge-base after:content-['Over'] after:bg-[#2952b3];
            }
            .under {
                @apply badge-base after:content-['Under'] after:bg-[#297314];
            }
            .bandiera {
                @apply badge-base after:content-['Bandiera'] after:bg-[#297314];
            }
            .inf {
                @apply badge-base after:content-['Infortunato'] after:bg-[#641414] ml-2;
            }

            .list-group {
                @apply flex flex-col rounded-lg overflow-hidden border border-gray-700 bg-gray-800 shadow-md;
            }
            .list-group-item {
                @apply flex justify-between items-center px-4 py-2.5 border-b border-gray-700 text-gray-200 text-sm;
            }
            .list-group-item:last-child {
                @apply border-b-0;
            }
            
            .list-title {
                @apply font-bold bg-[#043900] text-white border-b-0 uppercase tracking-wider;
            }
            .list-title.red {
                @apply bg-[#641414];
            }
            .list-title.blu {
                @apply bg-[#2952b3];
            }
        }
    </style>
</head>

<body class="bg-gray-900 font-poppins py-8 text-white min-h-screen">

    <main>
        <div class="max-w-[350px] mx-auto px-4">

            <div class="mb-6 text-center">
                <h5 class="font-bold text-xl m-0 flex items-center justify-center">
                    ROSA US AVELLINO 
                    <img class="inline-block max-w-[35px] ml-1.5" src="logo.png" alt="Stemma US Avellino">
                </h5>
            </div>

            <div class="space-y-6">
                <ul class="list-group" id="portieri"></ul>
                <ul class="list-group" id="difensori"></ul>
                <ul class="list-group" id="centrocampisti"></ul>
                <ul class="list-group" id="attaccanti"></ul>
                <ul class="list-group" id="in-prestito"></ul>
                <ul class="list-group" id="in-uscita"></ul>
                <ul class="list-group" id="fuori-lista"></ul>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
