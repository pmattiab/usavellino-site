<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <title>Rosa US Avellino</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet"> 

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer components {
            .badge-base {
                @apply after:inline-block after:text-[11px] after:rounded-md after:px-1.5 after:py-[1px] after:ml-2.5 after:-translate-y-px;
            }
            .over {
                @apply badge-base after:content-['Over'] after:bg-[#2952b3];
            }
            .under {
                @apply badge-base after:content-['Under'] after:bg-[#297314];
            }
            .bandiera {
                @apply badge-base after:content-['Bandiera'] after:bg-[#297314];
            }
            .inf {
                @apply badge-base after:content-['Infortunato'] after:bg-[#641414] ml-2;
            }

            .list-group {
                @apply flex flex-col rounded-lg overflow-hidden border border-gray-700 bg-gray-800 shadow-md;
            }
            .list-group-item {
                @apply flex justify-between items-center px-4 py-2.5 border-b border-gray-700 text-gray-200 text-sm;
            }
            .list-group-item:last-child {
                @apply border-b-0;
            }
            
            .list-title {
                @apply font-bold bg-[#043900] text-white border-b-0 uppercase tracking-wider;
            }
            .list-title.red {
                @apply bg-[#641414];
            }
            .list-title.blu {
                @apply bg-[#2952b3];
            }
        }
    </style>
</head>

<body class="bg-gray-900 font-poppins py-8 text-white min-h-screen">

    <main>
        <div class="max-w-[420px] mx-auto px-4">

            <div class="mb-6 text-center">
                <h5 class="font-bold text-xl m-0 flex items-center justify-center">
                    ROSA US AVELLINO 
                    <img class="inline-block max-w-[35px] ml-1.5" src="logo.png" alt="Stemma US Avellino">
                </h5>
            </div>

            <!-- Box Contatori a 4 colonne -->
            <div class="mb-5 flex justify-around bg-gray-800 p-3 rounded-lg border border-gray-700 text-sm shadow-md">
                <div class="text-center px-1">
                    <span class="block text-gray-400 text-[10px] sm:text-xs uppercase tracking-wider">Over</span>
                    <span id="count-over" class="font-bold text-lg text-[#2952b3]">0</span>
                </div>
                <div class="text-center px-1">
                    <span class="block text-gray-400 text-[10px] sm:text-xs uppercase tracking-wider">Under</span>
                    <span id="count-under" class="font-bold text-lg text-[#297314]">0</span>
                </div>
                <div class="text-center px-1">
                    <span class="block text-gray-400 text-[10px] sm:text-xs uppercase tracking-wider">Bandiera</span>
                    <span id="count-bandiera" class="font-bold text-lg text-yellow-500">0</span>
                </div>
                <div class="text-center px-1">
                    <span class="block text-gray-400 text-[10px] sm:text-xs uppercase tracking-wider">In Prestito</span>
                    <span id="count-prestito" class="font-bold text-lg text-orange-500">0</span>
                </div>
            </div>

            <div class="space-y-6">
                <!-- ROSA ATTIVA -->
                <ul class="list-group" id="portieri"></ul>
                <ul class="list-group" id="difensori"></ul>
                <ul class="list-group" id="centrocampisti"></ul>
                <ul class="list-group" id="attaccanti"></ul>

                <!-- DIVISORE VISIVO -->
                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-gray-700"></div>
                    <span class="flex-shrink-0 mx-4 text-gray-400 text-[11px] uppercase tracking-wider font-semibold">Mercato / Esuberi</span>
                    <div class="flex-grow border-t border-gray-700"></div>
                </div>

                <!-- LISTE MERCATO -->
                <ul class="list-group" id="in-prestito-list"></ul>
                <ul class="list-group" id="in-uscita"></ul>
                <ul class="list-group" id="fuori-lista"></ul>
            </div>

        </div>
    </main>

    <script>
        const rosaAvellino = {
            portieri: [
                { nome: "Iannarilli", status: "over", numero: 1, contratto: "proprietà", scadenza: 2028 },
                { nome: "Martinelli", status: "under", numero: "", contratto: "prestito", scadenza: 2027 },
                { nome: "Sassi", status: "under", numero: "", contratto: "proprietà", scadenza: 2027 }
            ],
            difensori: [
                { nome: "Simic", status: "over", numero: 44, contratto: "proprietà", scadenza: 2027 },
                { nome: "Izzo", status: "over", numero: 4, contratto: "proprietà", scadenza: 2028 },
                { nome: "Enrici", status: "over", numero: 56, contratto: "proprietà", scadenza: 2029 },
                { nome: "Fontanarosa", status: "under", numero: 63, contratto: "proprietà", scadenza: 2028 },
                { nome: "Sala", status: "over", numero: 3, contratto: "proprietà", scadenza: 2025 },
                { nome: "Moruzzi", status: "under", numero: "", contratto: "prestito", scadenza: 2027 },
                { nome: "Cancellotti", status: "over", numero: 29, contratto: "proprietà", scadenza: 2027 }
            ],
            centrocampisti: [
                { nome: "Palmiero", status: "over", numero: 6, contratto: "proprietà", scadenza: 2028 },
                { nome: "Palumbo", status: "over", numero: 20, contratto: "proprietà", scadenza: 2028 },
                { nome: "Besaggio", status: "over", numero: 39, contratto: "proprietà", scadenza: 2028 },
                { nome: "Sounas", status: "over", numero: 24, contratto: "proprietà", scadenza: 2028 },
                { nome: "Faticanti", status: "under", numero: "", contratto: "prestito", scadenza: 2027 },
                { nome: "Di Maggio", status: "under", numero: "", contratto: "proprietà", scadenza: 2030 }
            ],
            attaccanti: [
                { nome: "Russo", status: "bandiera", numero: 10, contratto: "proprietà", scadenza: 2030 },
                { nome: "Biasci", status: "over", numero: 14, contratto: "proprietà", scadenza: 2027 },
                { nome: "Favilli", status: "over", numero: 99, contratto: "proprietà", scadenza: 2027 },
                { nome: "Spadoni", status: "under", numero: "", contratto: "proprietà", scadenza: 2028 }
            ],
            inUscita: [
                { nome: "Manzi", status: "over" },
                { nome: "Cagnano", status: "over" },
                { nome: "Todisco", status: "over" },
                { nome: "Cancellieri", status: "over" },
                { nome: "Toscano", status: "over" },
                { nome: "Mutanda", status: "under" },
                { nome: "Maisto", status: "under" },
                { nome: "Tribuzzi", status: "over" },
                { nome: "Panico", status: "over" },
                { nome: "Insigne", status: "over" },
                { nome: "Patierno", status: "over" },
                { nome: "Pandolfi", status: "over" }
            ],
            fuoriLista: [

            ],
            inPrestito: [
                { nome: "Marchisano", status: "under" },
                { nome: "De Cristofaro", status: "over" },
                { nome: "D'Ausilio", status: "over" }
            ]
        };

        function creaListaGiocatori(containerId, titolo, titleClass, arrayGiocatori) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';

            const liTitolo = document.createElement("li");
            liTitolo.className = `list-group-item list-title ${titleClass}`;
            liTitolo.textContent = titolo;
            container.appendChild(liTitolo);

            arrayGiocatori.forEach(giocatore => {
                const liGiocatore = document.createElement("li");
                liGiocatore.className = "list-group-item";

                // --- CONTENITORE SINISTRO: Numero, Nome e Status ---
                const divLeft = document.createElement("div");
                divLeft.className = "flex items-center gap-3";

                if (giocatore.numero !== undefined) {
                    const spanNumero = document.createElement("span");
                    spanNumero.className = "bg-gray-700 text-white font-bold w-6 h-6 flex items-center justify-center rounded-full shrink-0 text-[11px]";
                    spanNumero.textContent = giocatore.numero;
                    divLeft.appendChild(spanNumero);
                }

                const spanNome = document.createElement("span");
                spanNome.className = giocatore.status;
                spanNome.textContent = giocatore.nome;
                divLeft.appendChild(spanNome);

                if (giocatore.infortunato) {
                    const spanInfortunato = document.createElement("span");
                    spanInfortunato.className = "inf"; 
                    divLeft.appendChild(spanInfortunato);
                }

                liGiocatore.appendChild(divLeft);

                // --- CONTENITORE DESTRO: Dettagli Contratto ---
                const divRight = document.createElement("div");
                divRight.className = "flex items-center space-x-3 text-[11px] text-gray-400";

                if (giocatore.contratto || giocatore.scadenza) {
                    const spanContratto = document.createElement("span");
                    
                    const tipoContratto = giocatore.contratto === 'prestito' ? 'Prestito' : 'Proprietà';
                    const scadenza = giocatore.scadenza ? giocatore.scadenza : '';
                    
                    if (giocatore.contratto === 'prestito') {
                        spanContratto.className = "text-orange-500/90";
                    }
                    
                    spanContratto.textContent = `${tipoContratto} ${scadenza}`.trim();
                    divRight.appendChild(spanContratto);
                }

                liGiocatore.appendChild(divRight);
                container.appendChild(liGiocatore);
            });
        }

        function aggiornaContatori() {
            let countOver = 0;
            let countUnder = 0;
            let countBandiera = 0;
            let countPrestito = 0;

            const repartiAttivi = [
                rosaAvellino.portieri, 
                rosaAvellino.difensori, 
                rosaAvellino.centrocampisti, 
                rosaAvellino.attaccanti
            ];

            repartiAttivi.forEach(reparto => {
                reparto.forEach(giocatore => {
                    if (giocatore.status === 'over') countOver++;
                    if (giocatore.status === 'under') countUnder++;
                    if (giocatore.status === 'bandiera') countBandiera++;
                    if (giocatore.contratto === 'prestito') countPrestito++;
                });
            });

            document.getElementById('count-over').textContent = countOver;
            document.getElementById('count-under').textContent = countUnder;
            document.getElementById('count-bandiera').textContent = countBandiera;
            document.getElementById('count-prestito').textContent = countPrestito;
        }

        document.addEventListener("DOMContentLoaded", () => {
            creaListaGiocatori("portieri", "PORTIERI", "", rosaAvellino.portieri);
            creaListaGiocatori("difensori", "DIFENSORI", "", rosaAvellino.difensori);
            creaListaGiocatori("centrocampisti", "CENTROCAMPISTI", "", rosaAvellino.centrocampisti);
            creaListaGiocatori("attaccanti", "ATTACCANTI", "", rosaAvellino.attaccanti);
            creaListaGiocatori("in-prestito-list", "CEDUTI IN PRESTITO", "blu", rosaAvellino.inPrestito);
            creaListaGiocatori("in-uscita", "IN USCITA", "red", rosaAvellino.inUscita);
            creaListaGiocatori("fuori-lista", "FUORI LISTA", "red", rosaAvellino.fuoriLista);

            aggiornaContatori();
        });

    </script>
</body>
</html>
